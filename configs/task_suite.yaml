# DMS 复现工程 —— 任务子集定义
#
# 来源：AndroidWorld 官方 `android_world` task family（`registry.TaskRegistry.ANDROID_WORLD_FAMILY`），
# 共 116 个任务、覆盖 20 个真实第三方 App（见 android_world/env/setup_device/apps.py 中
# 除 `android world`(自身测试用) 与 `miniwob` 之外的全部 AppSetup 子类）。
#
# 抽样原则：
#   1. 覆盖全部 20 个 App，每个 App 抽 1-2 个任务；
#   2. 难度分层：complexity <= 1.5 记为 easy，1.5~4 记为 medium，> 4 记为 hard；
#      本子集 easy:medium:hard 大致为 15:11:3，覆盖三档；
#   3. 至少包含 2-3 个「长序列/组合」任务（complexity 高或跨 App 组合），
#      用于体现 DMS 分层记忆与跨 sub-task 复用的价值；本子集含 5 个此类任务
#      （标记 tags 含 composite 或 long_sequence）：
#        - TurnOffWifiAndTurnOnBluetooth（composite，跨两个系统开关子任务）
#        - MarkorCreateNoteAndSms（composite，跨 Markor + SMS 两个 App）
#        - MarkorMergeNotes（complexity 7.8，长文件操作序列）
#        - ExpenseAddMultiple（complexity 6.0，多条目重复录入）
#        - RetroSavePlaylist（complexity 5.0，多步媒体库操作）
#   4. complexity 字段直接取自 AndroidWorld 任务类的 `complexity` 属性，用于按论文约定
#      设定每个任务的最大步数上限（通常 `max_steps = complexity * 10`）。
#
# 每个任务在每一轮（round）会用 `generate_random_params()` 重新随机化参数再实例化，
# 用于避免智能体对具体参数值“死记硬背”，只允许复用 sub-plan 级别的策略记忆。

meta:
  source_family: android_world          # registry.TaskRegistry.ANDROID_WORLD_FAMILY
  total_tasks_in_family: 116
  total_apps_in_family: 20
  selected_task_count: 29
  selected_app_count: 20
  difficulty_tiers:
    easy: "complexity <= 1.5"
    medium: "1.5 < complexity <= 4.0"
    hard: "complexity > 4.0"
  difficulty_distribution: {easy: 15, medium: 11, hard: 3}
  composite_or_long_sequence_count: 5
  rounds_per_task: 5
  conditions: [baseline_a_zero_shot, baseline_b_static_memory, dms]

